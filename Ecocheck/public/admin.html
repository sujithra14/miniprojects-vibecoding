
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Conscious Consumer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .sidebar {
            background-color: #343a40;
            color: white;
            height: 100vh;
            position: fixed;
        }

        .sidebar .nav-link {
            color: #adb5bd;
            padding: 15px 20px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background-color: #495057;
        }

        .main-content {
            margin-left: 250px;
            padding: 20px;
        }

        .brand-card {
            transition: transform 0.2s;
        }

        .brand-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <h4 class="text-center mb-4">
                        <i class="fas fa-leaf me-2"></i>
                        Admin Portal
                    </h4>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#dashboard" onclick="showSection('dashboard')">
                                <i class="fas fa-tachometer-alt me-2"></i>
                                Dashboard
                            </a>
                        </li>
                        <!-- <li class="nav-item">
                            <a class="nav-link" href="#brands" onclick="showSection('brands')">
                                <i class="fas fa-tags me-2"></i>
                                Manage Brands
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#add-brand" onclick="showSection('add-brand')">
                                <i class="fas fa-plus-circle me-2"></i>
                                Add Brand
                            </a>
                        </li> -->
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 main-content">
                <!-- Dashboard Section -->
                <div id="dashboard" class="section">
                    <div
                        class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">Dashboard</h1>
                    </div>

                    <div class="row">
                        <!-- Brand Statistics -->
                        <div class="col-md-3 mb-4">
                            <div class="card text-white bg-primary">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="totalBrands">0</h4>
                                            <p>Total Brands</p>
                                        </div>
                                        <i class="fas fa-tags fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-4">
                            <div class="card text-white bg-success">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="sustainableBrands">0</h4>
                                            <p>Sustainable Brands</p>
                                        </div>
                                        <i class="fas fa-leaf fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-4">
                            <div class="card text-white bg-warning">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="nonSustainableBrands">0</h4>
                                            <p>Non-Sustainable</p>
                                        </div>
                                        <i class="fas fa-industry fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3 mb-4">
                            <div class="card text-white bg-info">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h4 id="avgRating">0</h4>
                                            <p>Avg Rating</p>
                                        </div>
                                        <i class="fas fa-star fa-2x"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                <!-- Manage Brands Section -->
                <div id="brands" class="section" style="display: none;">
                    <div
                        class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">Manage Brands</h1>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Sustainable</th>
                                    <th>Rating</th>
                                    <th>Certifications</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="brandsTable">
                                <!-- Brands will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Add Brand Section -->
                <div id="add-brand" class="section" style="display: none;">
                    <div
                        class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">Add New Brand</h1>
                    </div>

                    <div class="row">
                        <div class="col-md-8">
                            <form id="addBrandForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="brandName" class="form-label">Brand Name *</label>
                                        <input type="text" class="form-control" id="brandName" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="websiteUrl" class="form-label">Website URL</label>
                                        <input type="url" class="form-control" id="websiteUrl">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="brandDescription" class="form-label">Description</label>
                                    <textarea class="form-control" id="brandDescription" rows="3"></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="sustainabilityRating" class="form-label">Sustainability Rating
                                            (1-5)</label>
                                        <select class="form-control" id="sustainabilityRating" required>
                                            <option value="1">1 ★</option>
                                            <option value="2">2 ★★</option>
                                            <option value="3">3 ★★★</option>
                                            <option value="4">4 ★★★★</option>
                                            <option value="5" selected>5 ★★★★★</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="isSustainable" class="form-label">Is Sustainable?</label>
                                        <select class="form-control" id="isSustainable" required>
                                            <option value="true">Yes</option>
                                            <option value="false">No</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="ecoCertifications" class="form-label">Eco Certifications</label>
                                        <input type="text" class="form-control" id="ecoCertifications"
                                            placeholder="B Corp, Fair Trade, etc.">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="sustainabilityDetails" class="form-label">Sustainability Details</label>
                                    <textarea class="form-control" id="sustainabilityDetails" rows="4"
                                        placeholder="Describe the brand's sustainability practices..."></textarea>
                                </div>

                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-plus me-2"></i>Add Brand
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Edit Brand Modal -->
    <div class="modal fade" id="editBrandModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Brand</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editBrandForm">
                        <input type="hidden" id="editBrandId">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editBrandName" class="form-label">Brand Name *</label>
                                <input type="text" class="form-control" id="editBrandName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editWebsiteUrl" class="form-label">Website URL</label>
                                <input type="url" class="form-control" id="editWebsiteUrl">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="editBrandDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="editBrandDescription" rows="3"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="editSustainabilityRating" class="form-label">Sustainability Rating</label>
                                <select class="form-control" id="editSustainabilityRating" required>
                                    <option value="1">1 ★</option>
                                    <option value="2">2 ★★</option>
                                    <option value="3">3 ★★★</option>
                                    <option value="4">4 ★★★★</option>
                                    <option value="5">5 ★★★★★</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editIsSustainable" class="form-label">Is Sustainable?</label>
                                <select class="form-control" id="editIsSustainable" required>
                                    <option value="true">Yes</option>
                                    <option value="false">No</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editEcoCertifications" class="form-label">Eco Certifications</label>
                                <input type="text" class="form-control" id="editEcoCertifications">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="editSustainabilityDetails" class="form-label">Sustainability Details</label>
                            <textarea class="form-control" id="editSustainabilityDetails" rows="4"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="updateBrand()">Update Brand</button>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>

</html>
