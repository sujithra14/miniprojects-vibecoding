<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Viewer - Conscious Consumer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .sustainable { background-color: #d4edda !important; }
        .not-sustainable { background-color: #f8d7da !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">📊 Database Data Viewer</h1>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Brands Table Data</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Rating</th>
                                <th>Sustainable</th>
                                <th>Certifications</th>
                                <th>Website</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            <tr>
                                <td colspan="8" class="text-center">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a href="/" class="btn btn-primary">← Back to Main Site</a>
            <a href="/admin" class="btn btn-success">Go to Admin Portal</a>
            <button onclick="refreshData()" class="btn btn-outline-secondary">Refresh Data</button>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/api/data-viewer');
                const data = await response.json();
                
                const tbody = document.getElementById('dataTable');
                tbody.innerHTML = data.map(brand => `
                    <tr class="${brand.is_sustainable ? 'sustainable' : 'not-sustainable'}">
                        <td><strong>${brand.id}</strong></td>
                        <td><strong>${brand.name}</strong></td>
                        <td>${brand.description || '-'}</td>
                        <td>
                            <span class="badge bg-warning text-dark">
                                ${'★'.repeat(brand.sustainability_rating)}${'☆'.repeat(5-brand.sustainability_rating)}
                            </span>
                        </td>
                        <td>
                            <span class="badge ${brand.is_sustainable ? 'bg-success' : 'bg-danger'}">
                                ${brand.is_sustainable ? 'Yes 🌱' : 'No ❌'}
                            </span>
                        </td>
                        <td>${brand.eco_certifications || 'None'}</td>
                        <td>
                            ${brand.website_url ? 
                                `<a href="${brand.website_url}" target="_blank">Visit</a>` : 
                                '-'
                            }
                        </td>
                        <td>${new Date(brand.created_at).toLocaleDateString()}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('dataTable').innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center text-danger">
                            Error loading data: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        function refreshData() {
            document.getElementById('dataTable').innerHTML = `
                <tr>
                    <td colspan="8" class="text-center">Refreshing data...</td>
                </tr>
            `;
            loadData();
        }

        // Load data when page opens
        loadData();
    </script>
</body>
</html>
